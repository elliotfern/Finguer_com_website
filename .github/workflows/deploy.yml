name: 'Build + Deploy (git pull + composer + bundle.js) Finguer'

on:
    push:
        branches: [main, develop]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: finguer_test
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.5'
                  extensions: pdo_mysql, mbstring, intl

            - name: Install Composer dependencies
              run: composer install --prefer-dist --no-progress

            - name: Wait for MySQL
              run: |
                  for i in {1..30}; do
                    mysqladmin ping -h127.0.0.1 -uroot -proot --silent && break
                    sleep 1
                  done

            - name: Load schema into test DB
              run: |
                  mysql -h127.0.0.1 -uroot -proot finguer_test < tests/schema/finguer_test_schema.sql

            - name: Create .env.test
              env:
                  APP_TOKEN_SECRET: ${{ secrets.TOKEN }}
              run: |
                  cat > .env.test << EOF
                  DB_HOST=127.0.0.1
                  DB_USER=root
                  DB_PASS=root
                  DB_DBNAME=finguer_test
                  TOKEN=${APP_TOKEN_SECRET}
                  EOF

            - name: Run Unit tests
              run: ./vendor/bin/phpunit --testsuite Unit

            - name: Run Integration tests
              run: ./vendor/bin/phpunit --testsuite Integration

            - name: Start PHP built-in server for HTTP integration tests
              run: |
                  php -S 127.0.0.1:8000 tests/router-test.php &
                  sleep 2

            - name: Run Integration HTTP tests
              env:
                  API_BASE_TEST: http://127.0.0.1:8000/api
              run: ./vendor/bin/phpunit --group http

    deploy:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies (npm)
              run: npm ci

            - name: Build (npm)
              run: npm run build

            - name: Decide target (PROD vs TEST)
              id: target
              run: |
                  set -euo pipefail
                  if [ "${GITHUB_REF_NAME}" = "main" ]; then
                    echo "env_name=PROD" >> "$GITHUB_OUTPUT"
                    echo "branch=main" >> "$GITHUB_OUTPUT"
                    echo "remote_dist_dir=/home/epgylzqu/finguer.com/public/dist" >> "$GITHUB_OUTPUT"
                    echo "remote_app_dir=/home/epgylzqu/finguer.com" >> "$GITHUB_OUTPUT"
                  else
                    echo "env_name=TEST" >> "$GITHUB_OUTPUT"
                    echo "branch=develop" >> "$GITHUB_OUTPUT"
                    echo "remote_dist_dir=/home/epgylzqu/finguer.com/dev/public/dist" >> "$GITHUB_OUTPUT"
                    echo "remote_app_dir=/home/epgylzqu/finguer.com/dev" >> "$GITHUB_OUTPUT"
                  fi

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H 87.98.230.129 >> ~/.ssh/known_hosts

            - name: 'Deploy BACKEND (reset hard) + vendor (composer install)'
              env:
                  REMOTE_APP_DIR: ${{ steps.target.outputs.remote_app_dir }}
                  REMOTE_BRANCH: ${{ steps.target.outputs.branch }}
                  REMOTE_ENV: ${{ steps.target.outputs.env_name }}
              run: |
                  set -euo pipefail

                  echo "Deploying BACKEND to: $REMOTE_ENV"
                  echo "Remote app dir:       $REMOTE_APP_DIR"
                  echo "Git branch:           $REMOTE_BRANCH"

                  ssh epgylzqu@87.98.230.129 "bash -lc '
                    set -euo pipefail

                    APP_DIR=\"$REMOTE_APP_DIR\"
                    BRANCH=\"$REMOTE_BRANCH\"

                    cd \"\$APP_DIR\"
                    test -d .git || { echo ERROR_NO_GIT; exit 2; }

                    git fetch origin \"\$BRANCH\"
                    git checkout -f \"\$BRANCH\"
                    git reset --hard \"origin/\$BRANCH\"

                    git clean -fd -e .env -e dist/ -e dev/ -e dev/dist/

                    if command -v composer >/dev/null 2>&1; then
                      composer install --no-dev --prefer-dist --optimize-autoloader
                    else
                      echo ERROR_NO_COMPOSER
                      exit 3
                    fi
                  '"

            - name: Upload bundle.js atomically
              env:
                  REMOTE_DIST_DIR: ${{ steps.target.outputs.remote_dist_dir }}
              run: |
                  set -euo pipefail

                  echo "Deploying FRONTEND to: ${{ steps.target.outputs.env_name }}"
                  echo "Remote dist dir: $REMOTE_DIST_DIR"

                  test -f public/dist/bundle.js || { echo "public/dist/bundle.js no existe"; exit 1; }

                  ssh epgylzqu@87.98.230.129 "mkdir -p '$REMOTE_DIST_DIR'"

                  scp public/dist/bundle.js epgylzqu@87.98.230.129:"$REMOTE_DIST_DIR/bundle.js.tmp"

                  ssh epgylzqu@87.98.230.129 "\
                    mv -f '$REMOTE_DIST_DIR/bundle.js.tmp' '$REMOTE_DIST_DIR/bundle.js' && \
                    chmod 644 '$REMOTE_DIST_DIR/bundle.js' \
                  "
